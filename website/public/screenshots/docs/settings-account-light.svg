<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" role="img" aria-labelledby="title desc">
  <title id="title">Coop extension Settings  Account tab</title>
  <desc id="desc">VS Code light theme showing Coop Settings Account screen with API key field, API base URL, and Test connection button.</desc>
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .titlebar { fill: #dddddd; }
      .editor { fill: #ffffff; }
      .activity { fill: #f3f3f3; }
      .sidebar { fill: #f3f3f3; }
      .border { stroke: #e0e0e0; stroke-width: 1; fill: none; }
      .tab-active { fill: #ffffff; }
      .tab-inactive { fill: #ececec; }
      .muted { fill: #6b7280; }
      .text { fill: #1e1e1e; }
      .field { fill: #ffffff; stroke: #d4d4d4; stroke-width: 1; }
      .card { fill: #fafafa; stroke: #e8e8e8; stroke-width: 1; }
      .btn { fill: #f5f5f5; stroke: #d8d8d8; stroke-width: 1; }
      .btn-success { fill: #ecfdf5; stroke: #86efac; stroke-width: 1; }
      .section { fill: #6b7280; font-size: 10px; letter-spacing: 0.04em; text-transform: uppercase; }
      .label { fill: #6b7280; font-size: 11px; }
      .value { fill: #1e1e1e; font-size: 13px; }
      .btn-text { fill: #1e1e1e; font-size: 11px; }
      .header-title { fill: #1e1e1e; font-size: 13px; font-weight: 600; }
      .header-back { fill: #6b7280; font-size: 11px; }
      .desc { fill: #6b7280; font-size: 11px; }
      .success { fill: #16a34a; font-size: 11px; }
      .placeholder { fill: #9e9e9e; font-size: 13px; }
      .masked { fill: #1e1e1e; font-size: 13px; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect width="820" height="520" rx="8" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <rect class="titlebar" x="1" y="1" width="818" height="32" rx="8"/>
  <rect class="titlebar" x="1" y="20" width="818" height="13"/>
  <circle cx="18" cy="17" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="17" r="5" fill="#febc2e"/>
  <circle cx="54" cy="17" r="5" fill="#28c840"/>
  <text x="410" y="21" text-anchor="middle" class="muted" font-size="11">Visual Studio Code  my-project</text>

  <!-- Editor area -->
  <rect class="editor" x="1" y="33" width="452" height="486"/>
  <rect x="16" y="48" width="180" height="10" rx="2" fill="#e8e8e8"/>
  <rect x="16" y="68" width="320" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="16" y="84" width="280" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="16" y="100" width="300" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="16" y="116" width="240" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="16" y="140" width="160" height="8" rx="2" fill="#dbeafe"/>
  <rect x="16" y="156" width="340" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="16" y="172" width="260" height="8" rx="2" fill="#f0f0f0"/>

  <!-- Activity bar -->
  <rect class="activity" x="453" y="33" width="48" height="486"/>
  <line x1="453" y1="33" x2="453" y2="519" class="border"/>
  <!-- Coop icon (active) -->
  <rect x="465" y="48" width="24" height="24" rx="4" fill="#0078d4" opacity="0.12"/>
  <text x="477" y="64" text-anchor="middle" fill="#0078d4" font-size="13" font-weight="700">C</text>
  <!-- Other activity icons -->
  <rect x="467" y="88" width="20" height="20" rx="3" fill="#c8c8c8" opacity="0.5"/>
  <rect x="467" y="120" width="20" height="20" rx="3" fill="#c8c8c8" opacity="0.35"/>
  <rect x="467" y="152" width="20" height="20" rx="3" fill="#c8c8c8" opacity="0.35"/>

  <!-- Coop sidebar / settings panel -->
  <rect class="sidebar" x="501" y="33" width="318" height="486"/>
  <line x1="501" y1="33" x2="501" y2="519" class="border"/>

  <!-- Settings header -->
  <line x1="501" y1="73" x2="819" y2="73" class="border"/>
  <text x="517" y="58" class="header-back">É Settings</text>
  <text x="650" y="58" class="header-title">Account</text>
  <!-- Close button -->
  <rect x="791" y="44" width="20" height="20" rx="4" fill="none" stroke="#d0d0d0"/>
  <text x="801" y="58" text-anchor="middle" class="muted" font-size="14">ū</text>

  <!-- Settings card -->
  <rect class="card" x="513" y="85" width="294" height="318" rx="8"/>

  <!-- Section: Advanced Ę API key -->
  <text x="525" y="108" class="section">Advanced Ę API key</text>

  <!-- CoopAI API key field -->
  <text x="525" y="132" class="label">CoopAI API key</text>
  <rect class="field" x="525" y="138" width="270" height="30" rx="6"/>
  <text x="535" y="157" class="masked">coop_""""""""""""""""</text>
  <!-- Reveal eye icon -->
  <rect x="767" y="146" width="18" height="14" rx="2" fill="none" stroke="#b0b0b0"/>
  <circle cx="776" cy="153" r="3" fill="none" stroke="#b0b0b0"/>

  <!-- Action buttons row -->
  <rect class="btn" x="525" y="178" width="72" height="26" rx="6"/>
  <text x="561" y="195" text-anchor="middle" class="btn-text">Save API key</text>
  <rect class="btn" x="603" y="178" width="72" height="26" rx="6"/>
  <text x="639" y="195" text-anchor="middle" class="btn-text">Copy API key</text>
  <rect class="btn-success" x="681" y="178" width="88" height="26" rx="6"/>
  <text x="725" y="195" text-anchor="middle" class="success" font-weight="600">Test connection</text>
  <!-- Success checkmark in button -->
  <path d="M710 190 l4 4 l8 -8" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Success message -->
  <text x="525" y="222" class="success">Connected  GET /health OK</text>

  <!-- Description -->
  <text x="525" y="246" class="desc">LLM provider keys are routed server-side; code host</text>
  <text x="525" y="260" class="desc">tokens stay in VS Code SecretStorage.</text>

  <!-- API base URL field -->
  <text x="525" y="288" class="label">API base URL</text>
  <rect class="field" x="525" y="294" width="270" height="30" rx="6"/>
  <text x="535" y="313" class="value">https://api.coop-ai.dev</text>

  <!-- Save URL button -->
  <rect class="btn" x="525" y="334" width="62" height="26" rx="6" opacity="0.45"/>
  <text x="556" y="351" text-anchor="middle" class="btn-text" opacity="0.45">Save URL</text>

  <!-- Status bar -->
  <rect fill="#007acc" x="1" y="500" width="818" height="19" rx="0"/>
  <rect fill="#007acc" x="1" y="507" width="818" height="12"/>
  <text x="12" y="513" fill="#ffffff" font-size="10">main</text>
  <text x="760" y="513" fill="#ffffff" font-size="10" text-anchor="end">Coop AI</text>
</svg>
