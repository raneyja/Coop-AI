<svg width="800" height="480" viewBox="0 0 800 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Coop quick actions in VS Code editor context menu (light theme)</title>
  <desc id="desc">VS Code editor with a code selection and the right-click context menu open, showing Coop quick actions: Trace Decision, Find Owner, Blast Radius, Understand Repo, and Knowledge Gaps.</desc>

  <!-- Window chrome -->
  <rect width="800" height="480" fill="#ffffff"/>
  <rect width="800" height="28" fill="#e8e8e8"/>
  <circle cx="14" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="50" cy="14" r="5" fill="#28c840"/>
  <text x="400" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#616161">coop-backend  Visual Studio Code</text>

  <!-- Activity bar -->
  <rect x="0" y="28" width="48" height="452" fill="#f3f3f3"/>
  <line x1="48" y1="28" x2="48" y2="480" stroke="#e5e5e5" stroke-width="1"/>
  <g fill="#616161" opacity="0.55">
    <rect x="16" y="48" width="16" height="14" rx="1" stroke="#616161" stroke-width="1.2" fill="none"/>
    <circle cx="24" cy="82" r="7" stroke="#616161" stroke-width="1.2" fill="none"/>
    <path d="M16 108 L24 100 L32 108 L32 120 L16 120 Z" stroke="#616161" stroke-width="1.2" fill="none"/>
  </g>
  <rect x="12" y="132" width="24" height="24" rx="5" fill="#1F6FEB"/>
  <rect x="16" y="138" width="16" height="12" rx="2" fill="#0D1117"/>
  <circle cx="20" cy="144" r="2.5" fill="#58A6FF"/>
  <circle cx="28" cy="144" r="2.5" fill="#58A6FF"/>
  <line x1="18" y1="149" x2="30" y2="149" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Editor panel -->
  <rect x="48" y="28" width="752" height="452" fill="#ffffff"/>
  <line x1="48" y1="28" x2="800" y2="28" stroke="#e5e5e5" stroke-width="0"/>

  <!-- Tab bar -->
  <rect x="48" y="28" width="752" height="35" fill="#f3f3f3"/>
  <line x1="48" y1="63" x2="800" y2="63" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="48" y="28" width="168" height="35" fill="#ffffff"/>
  <line x1="216" y1="28" x2="216" y2="63" stroke="#e0e0e0" stroke-width="1"/>
  <text x="60" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#333333">auth_middleware.go</text>
  <text x="230" y="50" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#888888" opacity="0.7">router.go</text>

  <!-- Line number gutter -->
  <rect x="48" y="63" width="48" height="417" fill="#ffffff"/>
  <line x1="96" y1="63" x2="96" y2="480" stroke="#eeeeee" stroke-width="1"/>

  <!-- Code lines (Go) -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">
    <!-- line numbers -->
    <g fill="#237893" text-anchor="end" font-size="11">
      <text x="88" y="88">38</text>
      <text x="88" y="108">39</text>
      <text x="88" y="128">40</text>
      <text x="88" y="148">41</text>
      <text x="88" y="168">42</text>
      <text x="88" y="188">43</text>
      <text x="88" y="208">44</text>
      <text x="88" y="228">45</text>
      <text x="88" y="248">46</text>
      <text x="88" y="268">47</text>
      <text x="88" y="288">48</text>
    </g>

    <text x="108" y="88" fill="#0000ff">func</text><text x="148" y="88" fill="#333333"> AuthMiddleware(next http.Handler) http.Handler {</text>
    <text x="108" y="108" fill="#0000ff">return</text><text x="158" y="108" fill="#333333"> http.HandlerFunc(</text><text x="278" y="108" fill="#0000ff">func</text><text x="310" y="108" fill="#333333">(w http.ResponseWriter, r *http.Request) {</text>
    <text x="108" y="128" fill="#333333">    session, err := validateSession(r)</text>
    <text x="108" y="148" fill="#0000ff">if</text><text x="128" y="148" fill="#333333"> err != nil {</text>
    <text x="108" y="168" fill="#333333">        http.Error(w, </text><text x="228" y="168" fill="#a31515">"unauthorized"</text><text x="318" y="168" fill="#333333">, http.StatusUnauthorized)</text>

    <!-- Selection highlight -->
    <rect x="104" y="176" width="520" height="56" fill="#add6ff" rx="1"/>

    <text x="108" y="188" fill="#0000ff">return</text>
    <text x="108" y="208" fill="#333333">    }</text>
    <text x="108" y="228" fill="#008000">// Zero-retention headers for LLM proxy path</text>
    <text x="108" y="248" fill="#333333">    w.Header().Set(</text><text x="248" y="248" fill="#a31515">"X-Zero-Retention"</text><text x="378" y="248" fill="#333333">, </text><text x="390" y="248" fill="#a31515">"true"</text><text x="420" y="248" fill="#333333">)</text>

    <text x="108" y="268" fill="#333333">    next.ServeHTTP(w, r)</text>
    <text x="108" y="288" fill="#333333">})</text>
  </g>

  <!-- Context menu -->
  <g filter="url(#menuShadow)">
    <rect x="420" y="168" width="248" height="262" rx="4" fill="#f3f3f3" stroke="#cccccc" stroke-width="1"/>
  </g>

  <g font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#333333">
    <!-- Standard items -->
    <text x="432" y="192">Cut</text>
    <text x="432" y="216">Copy</text>
    <text x="432" y="240">Paste</text>
    <line x1="428" y1="252" x2="660" y2="252" stroke="#cccccc" stroke-width="1"/>

    <!-- Coop quick actions -->
    <rect x="424" y="258" width="240" height="26" rx="2" fill="#0060c0"/>
    <text x="432" y="276" fill="#ffffff">Trace Decision</text>

    <text x="432" y="300">Find Owner</text>
    <text x="432" y="324">Blast Radius</text>
    <text x="432" y="348">Understand Repo</text>
    <text x="432" y="372">Knowledge Gaps</text>

    <line x1="428" y1="384" x2="660" y2="384" stroke="#cccccc" stroke-width="1"/>
    <text x="432" y="408" fill="#888888" font-size="12">Command Palette&</text>
  </g>

  <!-- Coop label chip on menu -->
  <rect x="576" y="262" width="44" height="16" rx="3" fill="#1F6FEB" opacity="0.15"/>
  <text x="598" y="274" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#1F6FEB">Coop</text>

  <defs>
    <filter id="menuShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>
</svg>
