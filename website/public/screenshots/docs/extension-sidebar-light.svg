<svg width="800" height="480" viewBox="0 0 800 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Coop sidebar in VS Code (light theme)</title>
  <desc id="desc">VS Code window showing the activity bar with the Coop icon selected, the Coop sidebar with quick actions, slash command hints, and the chat composer.</desc>

  <!-- Window chrome -->
  <rect width="800" height="480" fill="#ffffff"/>
  <rect width="800" height="28" fill="#e8e8e8"/>
  <circle cx="14" cy="14" r="5" fill="#ff5f57"/>
  <circle cx="32" cy="14" r="5" fill="#febc2e"/>
  <circle cx="50" cy="14" r="5" fill="#28c840"/>
  <text x="400" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#616161">my-project - Visual Studio Code</text>

  <!-- Editor area (background) -->
  <rect x="348" y="28" width="452" height="452" fill="#ffffff"/>
  <rect x="364" y="44" width="180" height="10" rx="2" fill="#e8e8e8"/>
  <rect x="364" y="64" width="380" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="364" y="80" width="340" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="364" y="96" width="360" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="364" y="112" width="300" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="364" y="128" width="370" height="8" rx="2" fill="#f0f0f0"/>
  <rect x="364" y="144" width="320" height="8" rx="2" fill="#f0f0f0"/>

  <!-- Activity bar -->
  <rect x="0" y="28" width="48" height="452" fill="#f3f3f3"/>
  <line x1="48" y1="28" x2="48" y2="480" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Activity bar icons (generic) -->
  <g fill="#616161" opacity="0.7">
    <rect x="16" y="48" width="16" height="14" rx="1" stroke="#616161" stroke-width="1.2" fill="none"/>
    <circle cx="24" cy="82" r="7" stroke="#616161" stroke-width="1.2" fill="none"/>
    <path d="M16 108 L24 100 L32 108 L32 120 L16 120 Z" stroke="#616161" stroke-width="1.2" fill="none"/>
    <polygon points="20,140 28,140 24,132" stroke="#616161" stroke-width="1.2" fill="none"/>
    <rect x="16" y="156" width="16" height="16" rx="2" stroke="#616161" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Coop activity bar icon (active) -->
  <rect x="0" y="188" width="3" height="32" fill="#007acc"/>
  <rect x="12" y="192" width="24" height="24" rx="5" fill="#1F6FEB"/>
  <rect x="16" y="198" width="16" height="12" rx="2" fill="#0D1117"/>
  <circle cx="20" cy="204" r="2.5" fill="#58A6FF"/>
  <circle cx="28" cy="204" r="2.5" fill="#58A6FF"/>
  <line x1="18" y1="209" x2="30" y2="209" stroke="#58A6FF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Coop sidebar panel -->
  <rect x="48" y="28" width="300" height="452" fill="#f3f3f3"/>
  <line x1="348" y1="28" x2="348" y2="480" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Sidebar header -->
  <rect x="48" y="28" width="300" height="36" fill="#f3f3f3"/>
  <line x1="48" y1="64" x2="348" y2="64" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="60" y="38" width="72" height="16" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="96" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#1e1e1e">New chat</text>
  <rect x="268" y="38" width="68" height="16" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="278" cy="46" r="3" fill="#22c55e"/>
  <text x="308" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6b7280">Autocomplete</text>

  <!-- Empty state: CoopAI title -->
  <text x="198" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#1e1e1e">CoopAI</text>

  <!-- Quick action grid -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6b7280">
    <text x="198" y="170" text-anchor="middle">Understand Repo</text>
    <text x="198" y="202" text-anchor="middle">Trace Decision</text>
    <text x="198" y="234" text-anchor="middle">Find Owner</text>
    <text x="198" y="266" text-anchor="middle">Blast Radius</text>
    <text x="198" y="298" text-anchor="middle">Knowledge Gaps</text>
  </g>

  <!-- Slash command hint -->
  <text x="198" y="328" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6b7280">
    <tspan>Or type </tspan>
    <tspan fill="#7c3aed" font-weight="500">/understand</tspan>
    <tspan>, </tspan>
    <tspan fill="#7c3aed" font-weight="500">/trace</tspan>
    <tspan>, </tspan>
    <tspan fill="#7c3aed" font-weight="500">/owner</tspan>
    <tspan>, </tspan>
    <tspan fill="#7c3aed" font-weight="500">/blast</tspan>
    <tspan>, </tspan>
    <tspan fill="#7c3aed" font-weight="500">/gaps</tspan>
    <tspan> in chat for the same actions.</tspan>
  </text>

  <!-- Chat composer -->
  <rect x="60" y="380" width="276" height="72" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="72" y="404" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#9e9e9e">Ask Coop, or type / for commands</text>

  <!-- Composer toolbar -->
  <g transform="translate(72, 424)">
    <rect x="0" y="0" width="18" height="18" rx="3" fill="transparent" stroke="#d4d4d4" stroke-width="0.8"/>
    <path d="M2 6 L6 6 L8 4 L16 4 L16 14 L2 14 Z" stroke="#6b7280" stroke-width="1" fill="none"/>
    <rect x="24" y="0" width="18" height="18" rx="3" fill="transparent"/>
    <path d="M30 4 C28 2 25 2 24 4 L20 12 C19 14 20 16 22 16 C24 16 25 14 24 12 L28 4" stroke="#6b7280" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  <rect x="300" y="424" width="28" height="28" rx="4" fill="#007acc"/>
  <path d="M308 438 L318 438 M314 432 L320 438 L314 444" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <text x="198" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6b7280" opacity="0.7">0/8000 - Shift+Enter for new line</text>
</svg>
