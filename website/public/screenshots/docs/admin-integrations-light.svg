<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" fill="none" role="img" aria-label="Admin portal Integrations page wireframe">
  <defs>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F6F8FA"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="760" fill="url(#pageBg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="208" height="760" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
  <rect x="0" y="0" width="208" height="56" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
  <circle cx="28" cy="28" r="10" fill="#3FB950" opacity="0.9"/>
  <text x="46" y="33" class="font" font-size="14" font-weight="700" fill="#1F2328">Coop AI</text>

  <!-- Nav items -->
  <g class="font" font-size="13" fill="#656D76">
    <text x="24" y="88">Dashboard</text>
    <text x="24" y="118">Indexing</text>
    <text x="24" y="148">Collections</text>
  </g>
  <!-- Active nav: Integrations -->
  <rect x="8" y="158" width="192" height="32" rx="4" fill="#F6F8FA" stroke="#D0D7DE"/>
  <rect x="8" y="158" width="3" height="32" rx="1.5" fill="#1F2328"/>
  <text x="24" y="179" class="font" font-size="13" font-weight="600" fill="#1F2328">Integrations</text>
  <g class="font" font-size="13" fill="#656D76">
    <text x="24" y="218">Users</text>
    <text x="24" y="248">Analytics</text>
    <text x="24" y="278">API Keys</text>
    <text x="24" y="308">Billing</text>
    <text x="24" y="338">Audit</text>
    <text x="24" y="368">Settings</text>
  </g>

  <!-- Top bar -->
  <rect x="208" y="0" width="1072" height="48" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1"/>
  <text x="232" y="30" class="font" font-size="13" fill="#1F2328">Acme Engineering</text>
  <rect x="368" y="16" width="72" height="18" rx="9" fill="#F6F8FA" stroke="#D0D7DE"/>
  <text x="382" y="29" class="font" font-size="10" font-weight="600" fill="#656D76">ENTERPRISE</text>
  <rect x="1156" y="12" width="72" height="24" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text x="1172" y="28" class="mono" font-size="11" fill="#656D76">Sign out</text>

  <!-- Main content -->
  <text x="232" y="96" class="font" font-size="20" font-weight="600" fill="#1F2328">Integrations</text>
  <text x="232" y="122" class="font" font-size="13" fill="#656D76">Connect your personal code and collaboration tools. OAuth opens in a new tab  return here and refresh status after approval.</text>

  <!-- Integration cards list -->
  <g transform="translate(232, 148)">

    <!-- GitHub - Connected -->
    <g>
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">GitHub</text>
      <circle cx="62" cy="23" r="3" fill="#1A7F37"/>
      <text x="70" y="28" class="font" font-size="11" font-weight="500" fill="#1A7F37">Connected</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Repositories, PRs, and code context</text>
      <text x="0" y="64" class="font" font-size="11" fill="#656D76">Connected as acme-corp</text>
      <rect x="760" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#CF222E" stroke-opacity="0.35"/>
      <text x="772" y="28" class="mono" font-size="11" fill="#CF222E">Disconnect</text>
      <rect x="824" y="10" width="44" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="834" y="28" class="mono" font-size="11" fill="#1F2328">Test</text>
      <rect x="876" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="886" y="28" class="mono" font-size="11" fill="#1F2328">Refresh</text>
    </g>

    <!-- Slack - Connected + Active + Manage access -->
    <g transform="translate(0, 88)">
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">Slack</text>
      <circle cx="48" cy="23" r="3" fill="#1A7F37"/>
      <text x="56" y="28" class="font" font-size="11" font-weight="500" fill="#1A7F37">Active</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Team messages and presence</text>
      <text x="0" y="64" class="font" font-size="11" fill="#656D76">Connected as Acme Engineering</text>
      <text x="0" y="80" class="font" font-size="11" fill="#1A7F37">3 channels · #engineering, #platform, #incidents</text>
      <rect x="648" y="10" width="96" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="660" y="28" class="mono" font-size="11" fill="#1F2328">Manage access</text>
      <rect x="752" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#CF222E" stroke-opacity="0.35"/>
      <text x="764" y="28" class="mono" font-size="11" fill="#CF222E">Disconnect</text>
      <rect x="816" y="10" width="44" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="826" y="28" class="mono" font-size="11" fill="#1F2328">Test</text>
      <rect x="868" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="878" y="28" class="mono" font-size="11" fill="#1F2328">Refresh</text>
    </g>

    <!-- Jira & Confluence - Connected -->
    <g transform="translate(0, 192)">
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">Jira &amp; Confluence</text>
      <circle cx="128" cy="23" r="3" fill="#1A7F37"/>
      <text x="136" y="28" class="font" font-size="11" font-weight="500" fill="#1A7F37">Connected</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Issues, docs, and project tracking</text>
      <text x="0" y="64" class="font" font-size="11" fill="#656D76">Connected as acme.atlassian.net</text>
      <rect x="648" y="10" width="96" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="660" y="28" class="mono" font-size="11" fill="#1F2328">Manage access</text>
      <rect x="752" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#CF222E" stroke-opacity="0.35"/>
      <text x="764" y="28" class="mono" font-size="11" fill="#CF222E">Disconnect</text>
      <rect x="816" y="10" width="44" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="826" y="28" class="mono" font-size="11" fill="#1F2328">Test</text>
      <rect x="868" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="878" y="28" class="mono" font-size="11" fill="#1F2328">Refresh</text>
    </g>

    <!-- Notion - Not connected -->
    <g transform="translate(0, 280)">
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">Notion</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Workspace pages and databases</text>
      <rect x="816" y="10" width="64" height="28" rx="6" fill="#3FB950"/>
      <text x="830" y="28" class="mono" font-size="11" font-weight="500" fill="#0D1117">Connect</text>
      <rect x="888" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="898" y="28" class="mono" font-size="11" fill="#1F2328">Refresh</text>
    </g>

    <!-- Google Docs - Not connected -->
    <g transform="translate(0, 352)">
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">Google Docs</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Documents and shared drives</text>
      <rect x="816" y="10" width="64" height="28" rx="6" fill="#3FB950"/>
      <text x="830" y="28" class="mono" font-size="11" font-weight="500" fill="#0D1117">Connect</text>
      <rect x="888" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="898" y="28" class="mono" font-size="11" fill="#1F2328">Refresh</text>
    </g>

    <!-- GitLab - Enterprise -->
    <g transform="translate(0, 424)">
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">GitLab</text>
      <rect x="52" y="14" width="72" height="18" rx="4" fill="#F6F8FA" stroke="#D0D7DE"/>
      <text x="62" y="27" class="font" font-size="10" font-weight="500" fill="#656D76">Enterprise</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Repositories, merge requests, and code context</text>
      <rect x="816" y="10" width="64" height="28" rx="6" fill="#3FB950" opacity="0.45"/>
      <text x="830" y="28" class="mono" font-size="11" font-weight="500" fill="#656D76">Connect</text>
      <rect x="888" y="10" width="56" height="28" rx="6" fill="#FFFFFF" stroke="#D0D7DE"/>
      <text x="898" y="28" class="mono" font-size="11" fill="#1F2328">Refresh</text>
    </g>

    <!-- Microsoft Teams - Coming soon -->
    <g transform="translate(0, 496)">
      <line x1="0" y1="0" x2="992" y2="0" stroke="#D0D7DE"/>
      <line x1="0" y1="72" x2="992" y2="72" stroke="#D0D7DE"/>
      <text x="0" y="28" class="font" font-size="14" font-weight="600" fill="#1F2328">Microsoft Teams</text>
      <rect x="128" y="14" width="76" height="18" rx="4" fill="#F6F8FA" stroke="#D0D7DE"/>
      <text x="138" y="27" class="font" font-size="10" font-weight="500" fill="#656D76">Coming soon</text>
      <text x="0" y="48" class="font" font-size="12" fill="#656D76">Channels and enterprise chat</text>
    </g>
  </g>

  <!-- URL hint -->
  <rect x="232" y="712" width="280" height="24" rx="4" fill="#FFFFFF" stroke="#D0D7DE"/>
  <text x="244" y="728" class="mono" font-size="11" fill="#656D76">admin.coop-ai.dev/integrations</text>
</svg>
