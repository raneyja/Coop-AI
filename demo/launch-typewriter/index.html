<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coop — Launch Typewriter Demo</title>
  <style>
    :root {
      --coop-panel-canvas: #1e1e1e;
      --coop-panel-foreground: #e5e5e5;
      --coop-panel-muted: #9d9d9d;
      --coop-composer-surface: #252526;
      --coop-composer-border: #323232;
      --coop-composer-border-focus: #424242;
      --coop-composer-shadow: none;
      --coop-composer-placeholder: #9d9d9d;
      --coop-composer-text: #e5e5e5;
      --coop-pill-surface: #2d2d30;
      --coop-pill-border: #3a3a3a;
      --progress-blue: #0078d4;
      --chrome-bg: #181818;
      --chrome-border: #2b2b2b;
      --demo-bg: #111111;
      --letter-flash: rgba(0, 120, 212, 0.55);
    }

    [data-theme="light"] {
      --coop-panel-canvas: #f3f3f3;
      --coop-panel-foreground: #1e1e1e;
      --coop-panel-muted: #6b7280;
      --coop-composer-surface: #ffffff;
      --coop-composer-border: #e0e0e0;
      --coop-composer-border-focus: #c8c8c8;
      --coop-composer-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      --coop-composer-placeholder: #9e9e9e;
      --coop-composer-text: #000000;
      --coop-pill-surface: #f0f0f0;
      --coop-pill-border: #d8d8d8;
      --progress-blue: #0078d4;
      --chrome-bg: #e8e8e8;
      --chrome-border: #d4d4d4;
      --demo-bg: #f5f5f5;
      --letter-flash: rgba(0, 120, 212, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--demo-bg);
      color: var(--coop-panel-foreground);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 32px 20px;
    }

    .demo-header {
      text-align: center;
      max-width: 520px;
    }

    .demo-header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .demo-header p {
      font-size: 12px;
      color: var(--coop-panel-muted);
      line-height: 1.5;
    }

    .demo-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .demo-btn {
      appearance: none;
      border: 1px solid var(--coop-composer-border);
      background: var(--coop-composer-surface);
      color: var(--coop-panel-foreground);
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .demo-btn:hover {
      border-color: var(--coop-composer-border-focus);
    }

    .demo-btn[aria-pressed="true"] {
      border-color: var(--progress-blue);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--progress-blue) 40%, transparent);
    }

    /* VS Code chrome mock */
    .vscode-shell {
      display: flex;
      width: min(920px, 100%);
      height: 560px;
      border: 1px solid var(--chrome-border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      background: var(--chrome-bg);
    }

    .vscode-activity {
      width: 48px;
      flex-shrink: 0;
      background: #333333;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
      gap: 14px;
    }

    [data-theme="light"] .vscode-activity {
      background: #e0e0e0;
    }

    .activity-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      opacity: 0.45;
    }

    .activity-icon--active {
      opacity: 1;
      outline: 2px solid var(--progress-blue);
      outline-offset: 2px;
    }

    .vscode-editor {
      flex: 1;
      background: #1e1e1e;
      border-right: 1px solid var(--chrome-border);
      display: flex;
      flex-direction: column;
    }

    [data-theme="light"] .vscode-editor {
      background: #ffffff;
    }

    .editor-tab {
      height: 35px;
      border-bottom: 1px solid var(--chrome-border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      color: var(--coop-panel-muted);
      gap: 8px;
    }

    .editor-tab span {
      color: var(--coop-panel-foreground);
    }

    .editor-body {
      flex: 1;
      padding: 16px 20px;
      font-family: Menlo, Monaco, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.6;
      color: #9cdcfe;
      opacity: 0.35;
    }

    /* Coop sidebar panel */
    .coop-panel {
      width: 340px;
      flex-shrink: 0;
      background: var(--coop-panel-canvas);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .coop-panel-header {
      height: 35px;
      border-bottom: 1px solid color-mix(in srgb, var(--coop-composer-border) 65%, transparent);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--coop-panel-foreground);
      gap: 6px;
    }

    .coop-panel-header img {
      width: 16px;
      height: 16px;
      opacity: 0.85;
      filter: invert(1);
    }

    [data-theme="light"] .coop-panel-header img {
      filter: none;
    }

    .coop-panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    /* Empty state layout */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }

    .empty-state.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .empty-state h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-align: center;
      margin-bottom: 20px;
    }

    .quick-actions {
      width: 100%;
      max-width: 280px;
      list-style: none;
    }

    .quick-actions li + li {
      margin-top: 2px;
    }

    .quick-action {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--coop-panel-muted);
      font-size: 13px;
      padding: 8px;
      border-radius: 6px;
      cursor: default;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s ease, transform 0.3s ease, color 0.15s;
    }

    .empty-state.is-visible .quick-action {
      opacity: 1;
      transform: translateY(0);
    }

    .empty-state.is-visible .quick-action:nth-child(1) { transition-delay: 0.05s; }
    .empty-state.is-visible .quick-action:nth-child(2) { transition-delay: 0.1s; }
    .empty-state.is-visible .quick-action:nth-child(3) { transition-delay: 0.15s; }
    .empty-state.is-visible .quick-action:nth-child(4) { transition-delay: 0.2s; }
    .empty-state.is-visible .quick-action:nth-child(5) { transition-delay: 0.25s; }

    /* Composer area */
    .composer-wrap {
      flex-shrink: 0;
      padding: 8px 12px 12px;
      position: relative;
    }

    .coop-composer {
      border: 1px solid var(--coop-composer-border);
      border-radius: 8px;
      background: var(--coop-composer-surface);
      box-shadow: var(--coop-composer-shadow);
      transition: border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .coop-composer.is-ready {
      border-color: var(--coop-composer-border-focus);
    }

    .composer-input-area {
      min-height: 38px;
      padding: 10px 12px 4px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--coop-composer-text);
      position: relative;
    }

    .composer-placeholder {
      color: var(--coop-composer-placeholder);
      position: absolute;
      left: 12px;
      top: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .composer-placeholder.is-visible {
      opacity: 1;
    }

    .composer-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 8px;
      opacity: 0;
      transition: opacity 0.3s ease 0.1s;
    }

    .composer-toolbar.is-visible {
      opacity: 1;
    }

    .toolbar-icons {
      display: flex;
      gap: 2px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: var(--coop-panel-muted);
      border-radius: 4px;
      display: grid;
      place-items: center;
    }

    .send-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: color-mix(in srgb, var(--coop-panel-muted) 25%, transparent);
      color: var(--coop-panel-muted);
      display: grid;
      place-items: center;
    }

    /* Typewriter overlay */
    .typewriter-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--coop-composer-text);
      background: var(--coop-composer-surface);
      z-index: 2;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .typewriter-overlay.is-exiting {
      opacity: 0;
      transform: translateY(-8px);
    }

    .typewriter-overlay.is-hidden {
      display: none;
    }

    .typewriter-text {
      display: inline;
      white-space: pre;
    }

    .typewriter-char {
      display: inline-block;
      opacity: 1;
      transition: text-shadow 0.12s ease, opacity 0.12s ease;
    }

    .typewriter-char.is-flashing {
      text-shadow: 0 0 12px var(--letter-flash), 0 0 4px var(--letter-flash);
      opacity: 1;
    }

    .typewriter-cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--coop-composer-text);
      margin-left: 1px;
      vertical-align: text-bottom;
      transform: translateY(-1px);
      animation: cursor-blink 1.06s step-end infinite;
    }

    .typewriter-cursor.is-off {
      opacity: 0;
      animation: none;
    }

    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    @keyframes letter-flash {
      0% {
        text-shadow: 0 0 14px var(--letter-flash), 0 0 6px var(--letter-flash);
        opacity: 1;
      }
      100% {
        text-shadow: none;
        opacity: 1;
      }
    }

    .typewriter-char.flash-animate {
      animation: letter-flash 0.14s ease-out forwards;
    }

    /* Status whisper */
    .sync-whisper {
      position: absolute;
      bottom: 72px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: var(--coop-panel-muted);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .sync-whisper.is-visible {
      opacity: 0.7;
    }

    .sync-whisper.is-hidden {
      opacity: 0;
    }

    /* Phase indicator (dev aid) */
    .phase-label {
      position: absolute;
      top: 44px;
      right: 10px;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--coop-panel-muted);
      opacity: 0.5;
      pointer-events: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .typewriter-cursor {
        animation: none;
        opacity: 1;
      }

      .typewriter-char.flash-animate {
        animation: none;
      }

      .typewriter-overlay,
      .empty-state,
      .quick-action,
      .composer-toolbar,
      .composer-placeholder {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1>Coop launch — typewriter loader</h1>
    <p>
      Blinking cursor, then <code>ask coop</code> types in with a per-letter flash.
      Hands off to the real composer and quick actions.
    </p>
  </div>

  <div class="demo-controls">
    <button type="button" class="demo-btn" id="btn-replay">Replay</button>
    <button type="button" class="demo-btn" id="btn-mode" aria-pressed="false">Abbreviated</button>
    <button type="button" class="demo-btn" id="btn-theme" aria-pressed="false">Light theme</button>
  </div>

  <div class="vscode-shell" aria-label="VS Code mock with Coop sidebar">
    <div class="vscode-activity" aria-hidden="true">
      <div class="activity-icon"></div>
      <div class="activity-icon activity-icon--active" title="CoopAI"></div>
      <div class="activity-icon"></div>
    </div>

    <div class="vscode-editor" aria-hidden="true">
      <div class="editor-tab">
        <span>ChatPanel.tsx</span>
      </div>
      <div class="editor-body">
        export function ChatPanel() {<br />
        &nbsp;&nbsp;// ...<br />
        }
      </div>
    </div>

    <aside class="coop-panel" id="coop-panel">
      <div class="coop-panel-header">
        <img src="../../website/public/coop-logo.png" alt="" onerror="this.style.display='none'" />
        CoopAI
      </div>

      <div class="coop-panel-body">
        <span class="phase-label" id="phase-label">idle</span>
        <span class="sync-whisper" id="sync-whisper">Syncing context…</span>

        <div class="empty-state" id="empty-state">
          <h2>CoopAI</h2>
          <ul class="quick-actions">
            <li><button type="button" class="quick-action">Understand Repo</button></li>
            <li><button type="button" class="quick-action">Trace Decision</button></li>
            <li><button type="button" class="quick-action">Find Owner</button></li>
            <li><button type="button" class="quick-action">Blast Radius</button></li>
            <li><button type="button" class="quick-action">Knowledge Gaps</button></li>
          </ul>
        </div>

        <div class="composer-wrap">
          <div class="coop-composer" id="composer">
            <div class="composer-input-area">
              <span class="composer-placeholder" id="placeholder">Ask Coop</span>
            </div>

            <div class="typewriter-overlay" id="typewriter">
              <span class="typewriter-text" id="typewriter-text"></span><span class="typewriter-cursor" id="cursor"></span>
            </div>

            <div class="composer-toolbar" id="toolbar">
              <div class="toolbar-icons">
                <button type="button" class="icon-btn" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M3 7h5l2 2h11v8H3V7z" stroke="currentColor" stroke-width="1.5"/></svg>
                </button>
                <button type="button" class="icon-btn" aria-hidden="true">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21.44 11.05l-8.49 8.49a5.5 5.5 0 01-7.78-7.78l9.19-9.19a3.5 3.5 0 014.95 4.95l-9.2 9.19a2 2 0 11-2.83-2.83l8.49-8.48" stroke="currentColor" stroke-width="1.5"/></svg>
                </button>
              </div>
              <button type="button" class="send-btn" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h12M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    const PHRASE = "ask coop";
    const LETTER_DELAYS_FULL = [200, 180, 240, 300, 190, 210, 200];
    const LETTER_DELAYS_ABBREV = [80, 70, 90, 100, 75, 85, 80];

    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const els = {
      typewriter: document.getElementById("typewriter"),
      typewriterText: document.getElementById("typewriter-text"),
      cursor: document.getElementById("cursor"),
      placeholder: document.getElementById("placeholder"),
      toolbar: document.getElementById("toolbar"),
      composer: document.getElementById("composer"),
      emptyState: document.getElementById("empty-state"),
      syncWhisper: document.getElementById("sync-whisper"),
      phaseLabel: document.getElementById("phase-label"),
      btnReplay: document.getElementById("btn-replay"),
      btnMode: document.getElementById("btn-mode"),
      btnTheme: document.getElementById("btn-theme")
    };

    let abbreviated = false;
    let runId = 0;
    let timers = [];

    function setPhase(label) {
      els.phaseLabel.textContent = label;
    }

    function clearTimers() {
      timers.forEach(clearTimeout);
      timers = [];
    }

    function wait(ms) {
      return new Promise((resolve) => {
        const id = setTimeout(resolve, ms);
        timers.push(id);
      });
    }

    function spanForChar(ch) {
      const span = document.createElement("span");
      span.className = "typewriter-char";
      span.textContent = ch;
      return span;
    }

    function flashChar(span) {
      if (prefersReducedMotion) return;
      span.classList.remove("flash-animate");
      void span.offsetWidth;
      span.classList.add("flash-animate");
    }

    function resetUI() {
      els.typewriterText.textContent = "";
      els.typewriter.classList.remove("is-exiting", "is-hidden");
      els.cursor.classList.remove("is-off");
      els.placeholder.classList.remove("is-visible");
      els.toolbar.classList.remove("is-visible");
      els.composer.classList.remove("is-ready");
      els.emptyState.classList.remove("is-visible");
      els.syncWhisper.classList.remove("is-visible", "is-hidden");
    }

    async function runSequence() {
      const id = ++runId;
      clearTimers();
      resetUI();

      const delays = abbreviated ? LETTER_DELAYS_ABBREV : LETTER_DELAYS_FULL;
      const cursorLead = abbreviated ? 200 : 450;
      const holdAfter = abbreviated ? 250 : 450;
      const exitMs = abbreviated ? 200 : 300;

      setPhase("cursor");

      // Phase 1: cursor blinks alone
      await wait(cursorLead);
      if (id !== runId) return;

      // Phase 2: type letters
      setPhase("typing");
      els.syncWhisper.classList.add("is-visible");

      const chars = PHRASE.split("");
      for (let i = 0; i < chars.length; i++) {
        const ch = chars[i];
        const span = spanForChar(ch);
        els.typewriterText.appendChild(span);
        flashChar(span);

        await wait(delays[i] ?? 200);
        if (id !== runId) return;
      }

      // Phase 3: hold with blinking cursor
      setPhase("hold");
      await wait(holdAfter);
      if (id !== runId) return;

      // Phase 4: handoff
      setPhase("handoff");
      els.syncWhisper.classList.add("is-hidden");
      els.typewriter.classList.add("is-exiting");

      await wait(exitMs);
      if (id !== runId) return;

      els.typewriter.classList.add("is-hidden");
      els.placeholder.classList.add("is-visible");
      els.toolbar.classList.add("is-visible");
      els.composer.classList.add("is-ready");
      els.emptyState.classList.add("is-visible");

      setPhase("ready");
    }

    els.btnReplay.addEventListener("click", () => runSequence());

    els.btnMode.addEventListener("click", () => {
      abbreviated = !abbreviated;
      els.btnMode.setAttribute("aria-pressed", String(abbreviated));
      els.btnMode.textContent = abbreviated ? "Full sequence" : "Abbreviated";
      runSequence();
    });

    els.btnTheme.addEventListener("click", () => {
      const isLight = document.documentElement.getAttribute("data-theme") === "light";
      document.documentElement.setAttribute("data-theme", isLight ? "dark" : "light");
      els.btnTheme.setAttribute("aria-pressed", String(!isLight));
      els.btnTheme.textContent = isLight ? "Light theme" : "Dark theme";
    });

    runSequence();
  </script>
</body>
</html>
